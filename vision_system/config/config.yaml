# ============================================================================
# Weed Detection — Configuration
# ============================================================================
# Edit values here to change behaviour. No need to touch the main script.
# See README.md for guidance on when to adjust each parameter.
# ============================================================================


model:   # Used for weed_detection inference only. See train_config.yaml for training-specific settings.
  model_type: "yolo"        # Options: "locateanything" or "yolo"
  locateanything_id: "nvidia/LocateAnything-3B"   # Only used for LocateAnything
  yolo_model: 'D:/MyProjects/AI-Sprayer/vision_system/runs/train/yolov8s_ep150_b8_lr0.001/weights/best.pt'  # Only used for YOLO
  device: "cpu"
  dtype: "float32"

paths:
  # input_dir: "weed_images"           # folder with your weed images
  input_dir: "images/test"           # folder with your weed images
  output_dir: "weed_detections"      # annotated images saved here
  results_file: "weed_detections.json"    # all bounding boxes saved here

detection:
  # Natural language prompt(s) sent to the model.
  # Try a more specific prompt if results are noisy or missing weed types,
  # e.g. "Locate all broadleaf weeds between the crop rows."
  prompts:
    # - "Locate all chickweed in this image."
    # - "Locate all brome plants separately. Draw one bounding box per individual plant. If there is no brome present, do not detect anything."
    - "Locate all individual weed plants in this image. Detect every weed regardless of species."
    - "Provide one separate bounding box for each distinct weed plant. Do not merge nearby plants."
    - "If no weeds are present, detect nothing."

  supported_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
    - ".webp"

  # LocateAnything doesn't output confidence scores natively;
  # 0.0 accepts all raw detections (before filtering below).
  conf_threshold: 0.0

generation:
  # Maximum length of the model's response per image.
  # Increase if many weeds per image cause output to be cut off.
  max_new_tokens: 256

  # How strongly the model is discouraged from repeating recent tokens.
  # Increase (e.g. 1.5) if it still loops/repeats boxes.
  # Decrease if it misses legitimately repeated detections.
  repetition_penalty: 1.3

  # Blocks the model from repeating any N-token sequence already generated.
  # Decrease (e.g. 4-6) for stronger anti-repetition if loops persist.
  # Increase if valid output is being cut off too early.
  no_repeat_ngram_size: 8

filtering:
  # Minimum box size, as a fraction of total image area, to be kept.
  # Increase if small junk boxes still appear.
  # Decrease if real small/young weeds get filtered out.
  min_box_area_fraction: 0.005

  # How much of a smaller box must overlap a larger accepted box before
  # the smaller one is dropped as junk (0.0-1.0).
  # Decrease (e.g. 0.8) if overlapping junk boxes aren't removed.
  # Increase (closer to 1.0) if adjacent real weeds get merged into one.
  containment_threshold: 0.8

visualization:
  box_color_bgr: [0, 255, 0]    # green, OpenCV BGR order
  box_thickness: 2
  label_color_bgr: [0, 255, 0]
  font: "FONT_HERSHEY_SIMPLEX"
  font_scale: 0.6


# ============================================================================
# Evaluation Configuration (Independent Execution)
# ============================================================================
evaluation:
  eval_model_type: "yolo"        # Options: "yolo" or "locateanything"
  
  # Specify the exact fine-tuned model weights or ID you want to test:
  eval_yolo_model: 'D:/MyProjects/AI-Sprayer/vision_system/runs/train/yolov8m_ep150_b8_lr0.001/weights/best.pt'
  # eval_yolo_model: 'D:/MyProjects/AI-Sprayer/yolov8n.pt'
  eval_locateanything_id: "nvidia/LocateAnything-3B"

  # Set to true to generate and save verification frames with boxes & centroids.
  visualize_detections: false
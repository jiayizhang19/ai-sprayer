# ============================================================================
# OPPD Weed Dataset — YOLO Dataset Descriptor
# ============================================================================
# This file tells YOLO/Ultralytics where your data lives and what the class
# IDs mean. Class IDs below MUST match the ones used when your .txt label
# files were generated (see convert_to_yolo.py CLASS_MAP).
#
# Folder layout expected (Ultralytics standard):
#   datasets/oppd_weeds/
#     images/train/*.jpg
#     images/val/*.jpg
#     images/test/*.jpg
#     labels/train/*.txt
#     labels/val/*.txt
#     labels/test/*.txt
# ============================================================================

# path: root folder containing images/ and labels/ subfolders.
# In this workspace the dataset lives under vision_system/.
